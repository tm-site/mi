  <style id="dynamic-theme">
    :root {
      --rog-red: #ff003c;
      --rog-cyan: #00f0ff;
      --rog-purple: #7b2cbf;
      --rog-dark: #06070a;
      --glow-intensity: 15px;
      --anim-speed: 5s;
    }
  </style>
  <style>
    body {
      background-color: var(--rog-dark);
      color: #f3f4f6;
      font-family: 'Cairo', 'Inter', sans-serif;
      overflow-x: hidden;
      transition: background-color 0.5s ease;
    }
    
    /* Cyber Overclock Matrix Animation Support */
    #cyber-matrix {
      position: fixed;
      inset: 0;
      z-index: -5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
      background: radial-gradient(circle at center, transparent 30%, rgba(6, 7, 10, 0.9));
    }
    body.overclocked #cyber-matrix {
      opacity: 0.15;
    }
    
    .glow-shadow {
      box-shadow: 0 0 var(--glow-intensity) rgba(255, 0, 60, 0.2);
    }
    .text-glow-red {
      text-shadow: 0 0 8px var(--rog-red);
    }
    .text-glow-cyan {
      text-shadow: 0 0 8px var(--rog-cyan);
    }
    .glass {
      background: rgba(18, 19, 26, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    @keyframes rgbMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .rgb-border {
      position: relative;
    }
    .rgb-border::after {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(45deg, var(--rog-red), var(--rog-purple), var(--rog-cyan), var(--rog-red));
      background-size: 300% 300%;
      animation: rgbMove 5s ease infinite;
      border-radius: inherit;
      z-index: -1;
      pointer-events: none;
    }
    .rog-btn {
      background: linear-gradient(90deg, #ff003c 0%, #7b2cbf 100%);
      color: white;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(255, 0, 60, 0.2);
    }
    .rog-btn:hover {
      box-shadow: 0 0 18px rgba(255, 0, 60, 0.5);
      transform: translateY(-2px);
    }
    .page-enter {
      animation: fadeIn 0.3s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Simple Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      pointer-events: none;
    }
    .toast {
      background: rgba(18, 19, 26, 0.95);
      border: 1px solid var(--rog-red);
      box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
      animation: toastIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
    }
    @keyframes toastIn {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Elegant Nav Secondary Pill Buttons & Theme Toggle Switch */
    .btn-nav-pill {
      border-radius: 9999px;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.45rem 1rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      border: 1px solid var(--border-color, rgba(255, 255, 255, 0.08));
      background-color: var(--pill-bg, rgba(255, 255, 255, 0.04));
      color: var(--pill-text, #9ca3af);
    }
    .btn-nav-pill:hover {
      background-color: var(--pill-hover-bg, rgba(255, 255, 255, 0.1));
      color: var(--pill-hover-text, #ffffff);
      border-color: var(--pill-hover-border, rgba(255, 255, 255, 0.2));
      transform: translateY(-1px);
    }
    .btn-nav-pill:active {
      transform: scale(0.92);
    }
    .btn-nav-pill.active-tab {
      background: var(--rog-red) !important;
      color: #ffffff !important;
      border-color: var(--rog-red) !important;
      box-shadow: 0 0 12px rgba(255, 0, 60, 0.35);
    }

    /* Day / Night Theme Toggle Switch styles */
    .theme-toggle-btn {
      position: relative;
      width: 40px;
      height: 40px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid var(--border-color);
      background-color: var(--pill-bg);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    .theme-toggle-btn:hover {
      border-color: var(--toggle-hover-border, #f59e0b);
      box-shadow: 0 0 12px var(--toggle-glow, rgba(245, 158, 11, 0.25));
    }
    .theme-toggle-btn:active {
      transform: scale(0.9);
    }
    .theme-toggle-icon {
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease, color 0.4s ease;
    }
    .light-mode-active .theme-toggle-icon {
      transform: rotate(360deg) scale(1.1);
      color: #f59e0b;
    }
    .dark-mode-active .theme-toggle-icon {
      transform: rotate(0deg) scale(0.95);
      color: #818cf8;
    }
  </style>

    // --- SYNTHESIZED SOUND CORE FX ---
    let audioCtx = null;
    function playSFX(type) {
      if (!state.soundOn) return;
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'click') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, now);
          osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
          gain.gain.setValueAtTime(0.04, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
          osc.start(now); osc.stop(now + 0.08);
        } else if (type === 'submit' || type === 'success') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(400, now);
          osc.frequency.setValueAtTime(600, now + 0.1);
          osc.frequency.setValueAtTime(900, now + 0.2);
          gain.gain.setValueAtTime(0.06, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
          osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'overclock') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(80, now);
          osc.frequency.exponentialRampToValueAtTime(180, now + 0.5);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
          osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'error') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.linearRampToValueAtTime(100, now + 0.25);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
          osc.start(now); osc.stop(now + 0.25);
        }
      } catch (err) { console.error("Sound failed", err); }
    }

    // --- CYBER OVERCLOCK BACKDROP SIMULATOR ---
    let matrixCanvas = null;
    let matrixInterval = null;
    function initCyberMatrix() {
      matrixCanvas = document.getElementById("cyber-matrix");
      if (!matrixCanvas) return;
      const ctx = matrixCanvas.getContext("2d");
      
      const resize = () => {
        matrixCanvas.width = window.innerWidth;
        matrixCanvas.height = window.innerHeight;
      };
      resize();
      window.addEventListener("resize", resize);
      
      const columns = Math.floor(matrixCanvas.width / 26);
      const drops = Array(columns).fill(1);
      const hexChars = "01ROG002006COMPATIBILITYCOREBENCHMARKTDP";
      
      function draw() {
        ctx.fillStyle = "rgba(6, 7, 10, 0.08)";
        ctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
        
        ctx.fillStyle = state.theme.cyan || "#00f0ff";
        ctx.font = "11px monospace";
        
        for (let i = 0; i < drops.length; i++) {
          const char = hexChars[Math.floor(Math.random() * hexChars.length)];
          ctx.fillText(char, i * 26, drops[i] * 26);
          if (drops[i] * 26 > matrixCanvas.height && Math.random() > 0.985) {
            drops[i] = 0;
          }
          drops[i]++;
        }
      }
      
      if (matrixInterval) clearInterval(matrixInterval);
      matrixInterval = setInterval(draw, 50);
    }

    function toggleOverclock() {
      state.overclockActive = !state.overclockActive;
      localStorage.setItem("rog_overclock", state.overclockActive);
      playSFX('overclock');
      
      const body = document.body;
      if (state.overclockActive) {
        body.classList.add("overclocked");
        showToast(state.currentLang === "ar" ? "تم تنشيط ميزة كسر السرعة القصوى كلياً!" : "Maximum Overclock Matrix Synchronized!");
        initCyberMatrix();
      } else {
        body.classList.remove("overclocked");
        if (matrixInterval) {
          clearInterval(matrixInterval);
          matrixInterval = null;
        }
        try {
          const ctx = matrixCanvas.getContext("2d");
          ctx.clearRect(0, 0, matrixCanvas.width, matrixCanvas.height);
        } catch(e){}
        showToast(state.currentLang === "ar" ? "تم إرجاع الإعدادات القياسية للمصنع" : "Factory Speeds Restored");
      }
      render();
    }

        existing.qty++;
      } else {
        state.cart.push({ id: productId, qty: 1 });
      }
      saveCart();
      showToast(t("add_cart_success"));
      render();
    }

    function removeFromCart(productId) {
      state.cart = state.cart.filter(item => item.id !== productId);
      saveCart();
      showToast(t("item_removed_cart"));
      render();
    }

    function updateQty(productId, newQty) {
      const item = state.cart.find(i => i.id === productId);
      if (item) {
        item.qty = Math.max(1, newQty);
        saveCart();
        render();
      }
    }

    function cartTotal() {
      return state.cart.reduce((sum, item) => {
        const prod = state.products.find(p => p.id === item.id);
        return sum + (prod ? prod.price * item.qty : 0);
      }, 0);
    }

      if (!state.user) {

      if (!state.user.wishlist) state.user.wishlist = [];
      const index = state.user.wishlist.indexOf(productId);
      if (index > -1) {
        state.user.wishlist.splice(index, 1);
        showToast(t("remove_wishlist_success"));
      } else {
        state.user.wishlist.push(productId);

      const index = state.user.compare.indexOf(productId);

      if (!state.user) {

        return;
      }
      if (!text.trim()) {
        showToast(t("fields_required"));
        return;
      }
      const prod = state.products.find(p => p.id === productId);
      if (prod) {

        prod.reviews.push({
          user: state.user.name,

          stars: parseInt(stars) || 5,
          date: new Date().toISOString().split("T")[0]
        });
        saveProducts();

        render();
      }

      const monthsSelect = document.getElementById("install-months-term");

      if (!slider || !monthsSelect || !downPctSelect) return;

      const value = parseInt(slider.value);
      const decRatio = parseInt(downPctSelect.value) / 100;
      const termMonths = parseInt(monthsSelect.value);

      const principal = value * (1 - decRatio);
      // Simulating a simple 5% flat annual interest rate standard Iraqi banking markup
      const markup = 1.05;
      const monthlyPayment = Math.floor((principal * markup) / termMonths);

      const emiLabel = document.querySelector(".id-output-emi-monthly-price");

        emiLabel.innerHTML = formatPrice(monthlyPayment) + " / month";
      }

    // --- CHECKOUT PROCESS ---
    function renderCheckout() {
      if (!state.user) return "";
      
      const isRtl = state.currentLang === "ar" || state.currentLang === "ku";
      const totalOriginal = cartTotal();
      
      // Calculate Discount
      let finalPrice = totalOriginal;
      if (state.activeCoupon) {
        finalPrice = totalOriginal * ((100 - state.activeCoupon.discountPercent) / 100);
      }

      // Live Installments calculation
      const downPct = state.checkoutDownPaymentPct || 20;
      const months = state.checkoutMonths || 6;
      const downAmount = finalPrice * (downPct / 100);
      const remainingAmount = finalPrice - downAmount;
      const interestRate = months >= 12 ? 0.08 : 0.04; // 8% for 12m+, 4% for short-term
      const totalInterest = remainingAmount * interestRate;
      const monthlyInstallment = (remainingAmount + totalInterest) / months;

      // Define default local variables if unset
      if (!state.checkoutPayment) state.checkoutPayment = "cash";
      if (!state.checkoutDownPaymentPct) state.checkoutDownPaymentPct = 20;
      if (!state.checkoutMonths) state.checkoutMonths = 6;

      window.changePaymentMethod = (method) => {
        state.checkoutPayment = method;
        playSFX('click');
        render();
      };

      window.setInstallmentMonths = (m) => {
        state.checkoutMonths = parseInt(m) || 6;

    function confirmOrderAction() {
      const nameVal = document.getElementById("checkout-fullname").value;
      const phoneVal = document.getElementById("checkout-phone").value;
      const addressVal = document.getElementById("checkout-address").value;

      if (!nameVal.trim() || !phoneVal.trim() || !addressVal.trim()) {
        playSFX('error');
        showToast(t("fields_required"));
        return;
      }

      const totalOriginal = cartTotal();
      let finalPrice = totalOriginal;
      if (state.activeCoupon) {
        finalPrice = totalOriginal * ((100 - state.activeCoupon.discountPercent) / 100);
      }

      const orderObj = {
        id: "ORD-" + Date.now(),
        items: [...state.cart],
        total: finalPrice,
        date: new Date().toLocaleString(state.currentLang === "ar" ? "ar-IQ" : "en-US"),
        shipping: {
          name: nameVal,
          phone: phoneVal,
          address: addressVal
        },
        payment: {
          method: state.checkoutPayment,
          coupon: state.activeCoupon ? state.activeCoupon.code : null,
          details: state.checkoutPayment === 'installments' ? {
            months: state.checkoutMonths,
            downPaymentPct: state.checkoutDownPaymentPct,
            monthly: (finalPrice - (finalPrice * (state.checkoutDownPaymentPct / 100))) / state.checkoutMonths
          } : null
        },
        status: "New"
      };

      if (!state.user.orders) state.user.orders = [];
      state.user.orders.push(orderObj);
      saveUser();

      // Clear Cart and Active coupon
      state.cart = [];
      state.activeCoupon = null;
      saveCart();

      playSFX('success');
      showToast(t("thanks_order"));
      navigate("invoice-" + orderObj.id);
    }

      if (input) {
        const fee = parseInt(input.value);
        if (!isNaN(fee) && fee >= 0) {
          state.provinces[idx].fee = fee;
          localStorage.setItem("rog_provinces", JSON.stringify(state.provinces));
          state.adminLogs.unshift(`[${new Date().toLocaleTimeString()}] DISPATCH_TARIFF: Province ${state.provinces[idx].nameEn} delivery surcharge adjusted to ${fee} IQD.`);
          showToast(state.currentLang === "ar" ? "تم تحديث أجور توصيل المحافظة وتأكيدها بنجاح!" : "Logistics tariff successfully locked.");
          render();
        }
      }
    };

    window.adminSaveCouponAction = () => {
      const codeInput = document.getElementById("adm-coupon-code");
      const percentInput = document.getElementById("adm-coupon-percent");
      
      const codeVal = codeInput ? codeInput.value.trim().toUpperCase() : "";
      const percentVal = percentInput ? parseInt(percentInput.value) : 15;

      if (!codeVal) {
        showToast("Coupon entry cannot be null.");
        playSFX('error');
        return;
      }

      // Check duplicate
      if (state.promoCodes.some(c => c.code === codeVal)) {
        showToast("Coupon already configured!");
        playSFX('error');
        return;
      }

      state.promoCodes.push({ code: codeVal, discountPercent: percentVal });
      localStorage.setItem("rog_coupons", JSON.stringify(state.promoCodes));
      state.adminLogs.unshift(`[${new Date().toLocaleTimeString()}] PROMO_CODE_REGISTER: Instantiated code ${codeVal} at ${percentVal}% OFF.`);
      showToast(state.currentLang === "ar" ? "تم توليد وتنشيط قسيمة الخصم بنجاح!" : "System Promo instances created successfully.");
      playSFX('success');
      
      if (codeInput) codeInput.value = "";
      render();
    };

    window.adminDeleteCouponAction = (code) => {
      state.promoCodes = state.promoCodes.filter(c => c.code !== code);
      localStorage.setItem("rog_coupons", JSON.stringify(state.promoCodes));
      state.adminLogs.unshift(`[${new Date().toLocaleTimeString()}] PROMO_CODE_EXPEL: Destroyed promotional token ${code}.`);
      showToast(state.currentLang === "ar" ? "تم إلغاء تفعيل كوبون الخصم." : "Promo criteria invalidated.");
      playSFX('click');
      render();
    };

    window.adminResolveTicketAction = (ticketId) => {
      const inputField = document.getElementById("ticket-reply-text-" + ticketId);
      const replyVal = inputField ? inputField.value.trim() : "";
      
      const ticket = state.supportTickets.find(tk => tk.id === ticketId);
      if (ticket) {
        ticket.status = "RESOLVED";
        ticket.reply = replyVal || "مرحباً عميل جمهور اللاعبين؛ تم فحص سؤالك من قبل الفريق الهندسي في بغداد وحل الصعوبة فوراً.";
        localStorage.setItem("rog_admin_tickets", JSON.stringify(state.supportTickets));
        state.adminLogs.unshift(`[${new Date().toLocaleTimeString()}] SECURITY_TICKET: Resolved inquiry ${ticketId}.`);
        showToast(state.currentLang === "ar" ? "تم الرد بنجاح وقفل هذه التذكرة وإعلام اللاعب!" : "Technical question archived.");
        playSFX('success');
        render();
      }
    };

    window.adminRevertStateSeeds = () => {
      if (confirm("🚨 WARNING: This will completely flush customized inventory items and reset the Iraqi storefront settings back to initial factory standards. Continue?")) {
        localStorage.removeItem("rog_custom_products");
        localStorage.removeItem("rog_coupons");
        localStorage.removeItem("rog_provinces");
        localStorage.removeItem("rog_admin_tickets");
        localStorage.removeItem("rog_theme_config");
        localStorage.removeItem("rog_usd_rate");
        location.reload();
      }
    };

    window.adminPrintMiniInvoice = (orderId) => {
      if (!state.user || !state.user.orders) return;
      const order = state.user.orders.find(o => o.id === orderId);
      if (!order) return;

      const printWindow = window.open("", "_blank");
      if (!printWindow) {
        showToast("Please allow pop-ups to print invoices / يرجى السماح بالنوافذ المنبثقة للطباعة");
        return;
      }

      printWindow.document.write(`
        <html>
          <head>
            <title>ROG STORE IRAQ - INVOICE ${order.id}</title>
            <style>
              body { font-family: monospace; color: #000; background: #fff; padding: 20px; direction: rtl; }
              .header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 20px; }
              .section { margin-bottom: 15px; }
              .total { font-weight: bold; border-top: 1px dashed #000; padding-top: 5px; font-size: 1.25em; }
              table { width: 100%; border-collapse: collapse; margin: 15px 0; }
              th, td { text-align: right; padding: 4px; }
            </style>
          </head>
          <body>
            <div class="header">
              <h2>جمهورية اللاعبين - العـراق</h2>
              <h3>REPUBLIC OF GAMERS - BAGHDAD INSTANCE</h3>
              <p>رقم تتبع شحنة المحافظات المحمي: ${order.id}</p>
            </div>
            <div class="section">
              <p><b>حساب الزبون:</b> ${order.shipping.name}</p>
              <p><b>رقم الهاتف المسؤول:</b> ${order.shipping.phone}</p>
              <p><b>محافظة وعنوان الشحن العراقي:</b> ${order.shipping.city} - ${order.shipping.address || 'العنوان المسجل'}</p>
            </div>
            <hr/>
            <table>
              <thead>
                <tr>
                  <th>القطعة والمواصفات</th>
                  <th>الكمية</th>
                  <th>السعر</th>
                </tr>
              </thead>
              <tbody>
                ${order.items.map(item => `
                  <tr>
                    <td>${item.name.ar}</td>
                    <td>x${item.qty}</td>
                    <td>${item.price.toLocaleString("ar-IQ")} د.ع</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            <div class="section total">
              <p>الحساب الإجمالي الكلي شامل الضرائب: ${order.total.toLocaleString("ar-IQ")} د.ع</p>
            </div>
            <div class="header" style="border-top: 2px dashed #000; border-bottom: none; margin-top: 30px; font-size: 0.9em;">
              <p>شكراً لشرائكم من المتجر الرسمي الأكبر بالعراق!</p>
              <p>جمهورية اللاعبين - العـراق ROG</p>
            </div>
            <script>window.print();<\/script>
          </body>
        </html>
      `);
      printWindow.document.close();
    };

    // --- APP STARTUP & LIFE CYCLES ---
    window.onload = () => {
      // 1. Terminate loader screen with dynamic transition
      const loader = document.getElementById("loading");
      if (loader) {
        loader.classList.add("opacity-0");
        setTimeout(() => loader.remove(), 500);
      }

      // 2. Load configurations and route
      applyTheme();
      updateRtlDirection();
      render();
    };
  </script>
</body>
</html>
